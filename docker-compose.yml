services:
  postgres:
    image: postgres:17-alpine
    container_name: kuquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kuquest}
      POSTGRES_USER: ${POSTGRES_USER:-kuquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kuquest-local-only}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-kuquest} -d ${POSTGRES_DB:-kuquest}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
