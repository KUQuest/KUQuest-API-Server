<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KUQuest Auth Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #17211b;
        background: #f3f6f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 680px);
      }

      header {
        margin-bottom: 24px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        color: #17653a;
        font-size: 0.875rem;
        font-weight: 700;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #1b7f49;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1.05;
        text-wrap: balance;
      }

      header p {
        max-width: 58ch;
        margin: 14px 0 0;
        color: #58635c;
        line-height: 1.6;
        text-wrap: pretty;
      }

      .card {
        padding: clamp(20px, 5vw, 32px);
        border: 1px solid #dce4df;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgb(20 44 30 / 8%);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 44px;
        border: 1px solid #cbd6cf;
        border-radius: 10px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #ffffff;
        color: #26332b;
      }

      button:hover:not(:disabled) {
        background: #f3f6f4;
      }

      button:focus-visible {
        outline: 3px solid #89c7a3;
        outline-offset: 2px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .primary {
        border-color: #17653a;
        background: #17653a;
        color: #ffffff;
      }

      .primary:hover:not(:disabled) {
        background: #11542f;
      }

      .status {
        min-height: 24px;
        margin: 18px 0 0;
        color: #455149;
        line-height: 1.5;
      }

      .status[data-type="error"] {
        color: #a12622;
      }

      .status[data-type="success"] {
        color: #17653a;
      }

      .session {
        margin-top: 22px;
        padding-top: 22px;
        border-top: 1px solid #e5ebe7;
      }

      .session h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      pre {
        min-height: 92px;
        margin: 0;
        overflow-x: auto;
        border-radius: 10px;
        padding: 14px;
        background: #17211b;
        color: #e8f2ec;
        font: 0.8125rem/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .note {
        margin: 18px 0 0;
        color: #69746d;
        font-size: 0.875rem;
        line-height: 1.5;
      }

      @media (max-width: 520px) {
        body {
          align-items: start;
          padding: 20px 16px;
        }

        .actions,
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="eyebrow"><span class="dot" aria-hidden="true"></span>KUQuest API</div>
        <h1>ทดสอบระบบเข้าสู่ระบบ</h1>
        <p>
          หน้าเครื่องมือสำหรับตรวจ Google OAuth, session และข้อมูลผู้ใช้ที่บันทึกโดย Better Auth
        </p>
      </header>

      <section class="card" aria-labelledby="auth-heading">
        <h2 id="auth-heading" hidden>Authentication controls</h2>
        <div class="actions">
          <button class="primary" id="sign-in" type="button">เข้าสู่ระบบด้วย Google</button>
          <button id="refresh-session" type="button">ตรวจสอบ Session</button>
          <button id="sign-out" type="button" hidden>ออกจากระบบ</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite">
          กำลังตรวจสอบ session…
        </p>

        <div class="session">
          <h2>Session result</h2>
          <pre id="session-output" aria-live="polite">กำลังโหลด…</pre>
        </div>

        <p class="note">อนุญาตเฉพาะบัญชี Google ที่มีอีเมลลงท้ายด้วย @ku.th เท่านั้น</p>
      </section>
    </main>

    <script>
      const signInButton = document.querySelector('#sign-in');
      const refreshButton = document.querySelector('#refresh-session');
      const signOutButton = document.querySelector('#sign-out');
      const statusElement = document.querySelector('#status');
      const sessionOutput = document.querySelector('#session-output');

      const setBusy = (busy) => {
        signInButton.disabled = busy;
        refreshButton.disabled = busy;
        signOutButton.disabled = busy;
      };

      const setStatus = (message, type = 'info') => {
        statusElement.textContent = message;
        statusElement.dataset.type = type;
      };

      const readJson = async (response) => {
        const body = await response.json().catch(() => null);

        if (!response.ok) {
          throw new Error(body?.message ?? `Request failed (${response.status})`);
        }

        return body;
      };

      const safeSessionView = (data) => {
        if (!data) return null;

        return {
          user: data.user,
          session: {
            id: data.session?.id,
            userId: data.session?.userId,
            createdAt: data.session?.createdAt,
            updatedAt: data.session?.updatedAt,
            expiresAt: data.session?.expiresAt,
          },
        };
      };

      const refreshSession = async () => {
        setBusy(true);
        setStatus('กำลังตรวจสอบ session…');

        try {
          const response = await fetch('/api/auth/get-session', {
            credentials: 'include',
          });
          const data = await readJson(response);

          sessionOutput.textContent = JSON.stringify(safeSessionView(data), null, 2);
          signInButton.hidden = Boolean(data);
          signOutButton.hidden = !data;
          setStatus(
            data ? `เข้าสู่ระบบแล้ว: ${data.user.email}` : 'ยังไม่ได้เข้าสู่ระบบ',
            data ? 'success' : 'info',
          );
        } catch (error) {
          sessionOutput.textContent = 'null';
          setStatus(error instanceof Error ? error.message : 'ตรวจสอบ session ไม่สำเร็จ', 'error');
        } finally {
          setBusy(false);
        }
      };

      const signIn = async () => {
        setBusy(true);
        setStatus('กำลังเปิด Google account selector…');

        try {
          const response = await fetch('/api/auth/sign-in/social', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              provider: 'google',
              callbackURL: `${window.location.origin}/`,
              errorCallbackURL: `${window.location.origin}/`,
              disableRedirect: true,
            }),
          });
          const data = await readJson(response);

          if (!data?.url) throw new Error('ไม่ได้รับ Google authorization URL');

          window.location.assign(data.url);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'เริ่ม Google login ไม่สำเร็จ', 'error');
          setBusy(false);
        }
      };

      const signOut = async () => {
        setBusy(true);
        setStatus('กำลังออกจากระบบ…');

        try {
          const response = await fetch('/api/auth/sign-out', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          await readJson(response);
          await refreshSession();
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'ออกจากระบบไม่สำเร็จ', 'error');
          setBusy(false);
        }
      };

      if (window.location.protocol === 'file:') {
        setBusy(true);
        setStatus('ไม่สามารถเปิดหน้า Auth Test ผ่าน file:// ได้', 'error');
        sessionOutput.textContent =
          'เริ่ม API ด้วยคำสั่ง bun run dev แล้วเปิด http://localhost:5000 ใน browser';
      } else {
        const oauthError = new URLSearchParams(window.location.search).get('error');
        if (oauthError) {
          setStatus(`Google login ไม่สำเร็จ: ${oauthError}`, 'error');
          history.replaceState({}, '', window.location.pathname);
        }

        signInButton.addEventListener('click', signIn);
        refreshButton.addEventListener('click', refreshSession);
        signOutButton.addEventListener('click', signOut);
        refreshSession();
      }
    </script>
  </body>
</html>
